apiVersion: apps/v1
kind: Deployment
metadata:
  name: golang-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: golang-app
  template:
    metadata:
      labels:
        app: golang-app
    spec:
      containers:
      - name: golang-app
        image: therealbatman1/golang-devops-app:v4
        ports:
        - containerPort: 8080
